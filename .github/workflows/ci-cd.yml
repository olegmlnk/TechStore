name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/tech-store-client/package-lock.json

      - name: Frontend CI
        working-directory: client/tech-store-client
        run: |
          npm ci
          npm run lint
          npm run test:unit
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/tech-store-client/dist/tech-store-client

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Backend CI
        working-directory: server/TechStore
        run: |
          dotnet restore TechStore.sln
          dotnet build TechStore.sln --configuration Release --no-restore
          dotnet publish TechStore.API/TechStore.API.csproj --configuration Release --no-build --output ./publish/TechStore.API

      - uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: server/TechStore/publish/TechStore.API

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      FRONTEND_API_URL: ${{ secrets.FRONTEND_API_URL }}
      AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        shell: bash
        run: |
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID FRONTEND_API_URL AZURE_WEBAPP_NAME AZURE_WEBAPP_PUBLISH_PROFILE; do
            [ -n "${!name}" ] || { echo "Missing secret: $name"; exit 1; }
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/tech-store-client/package-lock.json

      - name: Deploy frontend to Vercel
        working-directory: client/tech-store-client
        shell: bash
        run: |
          npm ci
          cat <<EOF > src/environments/environment.production.ts
          export const environment = {
            production: true,
            apiUrl: '${FRONTEND_API_URL}',
            appStatus: 'Production Mode',
          };
          EOF
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend-publish

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend-publish
