<nav class="navbar">
  <a routerLink="/" class="nav-brand">
    <span class="brand-icon">⚡</span>
    <span class="brand-text">TechStore</span>
  </a>

  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
      Catalog
    </a>

    @if (authService.isLoggedIn()) {
      <button class="nav-btn cart-btn" (click)="cartService.toggleCart()" data-testid="nav-cart">
        🛒 Cart
        @if (cartService.itemCount() > 0) {
          <span class="cart-badge" data-testid="nav-cart-badge">{{ cartService.itemCount() }}</span>
        }
      </button>

      @if (authService.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active" class="nav-link admin-link">
          🛡️ Admin
        </a>
      }
      <a routerLink="/profile" routerLinkActive="active" class="nav-link" data-testid="nav-profile">
        Profile
      </a>
      <button class="nav-btn logout" (click)="authService.logout()" data-testid="nav-logout">
        Log Out
      </button>
    } @else {
      <a routerLink="/auth" routerLinkActive="active" class="nav-link sign-in" data-testid="nav-sign-in">
        Sign In
      </a>
    }
  </div>
</nav>
